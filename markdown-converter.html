<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech-MD Studio | Professional Markdown Reader</title>
    
    <!-- Libraries via CDN for Styling, Parsing, Highlighting, and Exporting -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        /* Editor Styles */
        #editor-area {
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
            outline: none;
        }
        
        /* Code Block Padding in Renderer */
        .markdown-body pre { padding: 1rem !important; border-radius: 0.5rem; overflow-x: auto; }
        .markdown-body code { color: inherit; }
        .markdown-body pre code { color: white !important; background: transparent !important; }
        
        /* Loading Overlay */
        #loading { transition: opacity 0.3s; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 h-screen flex flex-col overflow-hidden">

    <!-- Top Navigation Bar -->
    <header class="h-14 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-emerald-400 font-bold text-xl">&lt;/&gt;</span>
            <h1 class="font-semibold text-lg tracking-wide">Tech-MD Studio</h1>
        </div>
        
        <div class="flex items-center gap-3">
            <!-- Import Button -->
            <input type="file" id="file-input" class="hidden" accept=".md,.markdown,.txt">
            <button onclick="document.getElementById('file-input').click()" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 rounded text-sm transition">Import File</button>
            
            <div class="h-4 w-[1px] bg-gray-600"></div>

            <!-- Auto Format Button -->
            <button onclick="autoFormatText()" class="px-3 py-1.5 bg-purple-600 hover:bg-purple-700 rounded text-sm transition tooltip" title="Convert plain text to Markdown structure">
                🔄 Convert Text
            </button>

            <div class="h-4 w-[1px] bg-gray-600"></div>

            <!-- Export Buttons -->
            <button onclick="exportMarkdown()" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded text-sm transition">Save .md</button>
            <button onclick="exportHTML()" class="px-3 py-1.5 bg-green-600 hover:bg-green-700 rounded text-sm transition">Save HTML</button>
            <button onclick="exportPDF()" class="px-3 py-1.5 bg-red-600 hover:bg-red-700 rounded text-sm transition">Save PDF</button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-row relative">
        
        <!-- Left: Editor Pane -->
        <section class="w-1/2 flex flex-col border-r border-gray-700 bg-gray-900">
            <div class="bg-gray-800 px-3 py-1 text-xs text-gray-400 uppercase tracking-wider border-b border-gray-700">Source / Input</div>
            <textarea 
                id="editor-area" 
                class="flex-1 w-full p-4 bg-gray-900 text-gray-300 resize-none focus:outline-none font-mono text-sm leading-relaxed placeholder-gray-600"
                placeholder="# Start typing or import a file..."
                spellcheck="false"
            ></textarea>
        </section>

        <!-- Right: Preview Pane -->
        <section class="w-1/2 flex flex-col bg-white text-gray-800 overflow-y-auto custom-scroll">
            <div class="bg-gray-200 px-3 py-1 text-xs text-gray-600 uppercase tracking-wider border-b border-gray-300 sticky top-0 z-10">Rendered Output</div>
            <div id="preview-area" class="p-8 prose prose-slate max-w-none min-h-full">
                <div class="text-gray-400 italic text-center mt-20">Preview will appear here...</div>
            </div>
        </section>
    </main>

    <!-- Hidden container for PDF export sizing -->
    <div id="export-container" class="hidden">
        <div id="export-content" class="p-8 bg-white text-black"></div>
    </div>

    <script>
        // --- 1. Configuration & Initialization ---
        const editor = document.getElementById('editor-area');
        const preview = document.getElementById('preview-area');
        const fileInput = document.getElementById('file-input');
        
        // Configure Marked.js with Syntax Highlighting
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-' 
        });

        // Load Default Text
        const defaultText = `# Tech-MD Studio\n\nWelcome to your **machine-code markdown** environment.\n\n## Features\n\n- [x] Import Files\n- [x] Syntax Highlighting\n- [ ] Auto-Format Support\n\n### Sample Code\n\`\`\`javascript\nfunction optimizeSystem(input) {\n  console.log("Processing data stream...");\n  return input.map(i => i * 2);\n}\n\`\`\`\n\nHappy Coding!`;
        
        // Try to load from LocalStorage
        const savedContent = localStorage.getItem('tm_saved_draft');
        editor.value = savedContent || defaultText;
        renderMarkdown();

        // Listen for changes
        editor.addEventListener('input', () => {
            renderMarkdown();
            localStorage.setItem('tm_saved_draft', editor.value);
        });

        // --- 2. Core Logic ---

        function renderMarkdown() {
            const md = editor.value;
            const html = marked.parse(md);
            preview.innerHTML = html;
            
            // Re-highlight after DOM update
            preview.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        }

        // --- 3. Import Functionality ---

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                editor.value = event.target.result;
                renderMarkdown();
            };
            reader.readAsText(file);
        });

        // --- 4. Export Functions ---

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportMarkdown() {
            downloadFile(editor.value, 'document.md', 'text/markdown');
        }

        function exportHTML() {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = preview.innerHTML;
            
            // Basic wrapper for valid HTML
            const htmlString = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Document</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>body{padding:40px;font-family:system-ui} pre{border-radius:8px;}</style></head>
<body>${tempDiv.innerHTML}</body></html>`;
            
            downloadFile(htmlString, 'document.html', 'text/html');
        }

        function exportPDF() {
            const element = document.getElementById('preview-area');
            // Temporary style adjustment for print
            const originalStyles = element.getAttribute('style');
            
            const opt = {
                margin:       [10, 10, 10, 10], // t,r,b,l
                filename:     'document.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Ensure the content is fully styled before capturing
            html2pdf().set(opt).from(element).save().then(() => {});
        }

        // --- 5. Text Conversion (The "Converter" Feature) ---
        
        function autoFormatText() {
            let text = editor.value;
            
            // Helper: Detect Code Blocks
            // This is a simplistic heuristic based on indentation
            const lines = text.split('\n');
            let formattedLines = [];
            let inBlock = false;

            // 1. Simple Heuristic: Indentations become code blocks (basic attempt)
            // Note: Real NLP conversion requires complex logic. We'll do structural improvements.
            
            // Add Headers for short centered lines? (Too risky for code docs)
            
            // Better Approach: Wrap long isolated code-like lines
            for(let i=0; i<lines.length; i++) {
                let line = lines[i].trim();
                
                // Detect Potential Code (starts with variable, loop, function keywords loosely)
                if(line.match(/^(let|const|var|def|func|class|\$|#)/i)) {
                    line = "> " + line; // Quote style for pseudo-code explanation
                }
                
                // Detect Links
                if(line.includes('http') || line.includes('www')) {
                   line = `[Link](${line})`;
                }

                formattedLines.push(lines[i]);
            }
            
            editor.value = formattedLines.join('\n');
            renderMarkdown();
        }

    </script>
</body>
</html>
